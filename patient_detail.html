<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if rtl else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <title>Twin | {{ p.name }}</title>
    <style>
        .card { background: rgba(15, 23, 42, 0.9); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .video-box { border-radius: 2rem; overflow: hidden; background: #000; position: relative; }
    </style>
</head>
<body class="bg-slate-950 text-white p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <a href="{{ url_for('dashboard') }}" class="bg-slate-900 px-6 py-2 rounded-xl text-slate-400 font-bold hover:text-white">{{ text.dash }}</a>
            <h1 class="text-xl font-black text-blue-500 tracking-tighter">{{ text.platform_name }}</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <div class="lg:col-span-4 space-y-6">
                <div class="card p-6 shadow-2xl">
                    <h2 class="text-2xl font-bold text-blue-400 mb-6">{{ p.name }}</h2>
                    <form action="{{ url_for('add_record', p_id=p.id) }}" method="POST" class="space-y-4">
                        <input type="date" name="date" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" name="creatinine" placeholder="{{ text.cr }}" class="bg-slate-900 border border-slate-700 p-4 rounded-xl" required>
                            <input type="number" step="0.01" name="albumin" placeholder="{{ text.alb }}" class="bg-slate-900 border border-slate-700 p-4 rounded-xl" required>
                        </div>
                        <select name="urine_concentration" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl">
                            <option value="medium">{{ text.conc }}</option>
                            <option value="high">{{ text.conc_high }}</option>
                            <option value="medium">{{ text.conc_med }}</option>
                            <option value="low">{{ text.conc_low }}</option>
                        </select>
                        <button type="submit" class="w-full bg-blue-600 font-black py-4 rounded-xl hover:bg-blue-500 uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                            {{ text.save }}
                        </button>
                    </form>
                </div>

                {% if latest %}
                <button onclick="toggleWater()" id="waterBtn" class="w-full p-5 rounded-2xl font-bold flex items-center justify-center gap-3 bg-blue-700 shadow-xl">
                    <i class="fas fa-tint"></i> <span>{{ text.what_if }}</span>
                </button>
                {% endif %}
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="video-box aspect-video">
                    {% if latest %}
                    <video id="kidneyVideo" autoplay loop muted playsinline class="w-full h-full object-cover">
                        <source id="videoSource" src="{{ url_for('static', filename='videos/stage' ~ stage ~ '.mp4') }}" type="video/mp4">
                    </video>
                    <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end bg-gradient-to-t from-black/60 p-6 rounded-3xl">
                        <div>
                            <p id="simLabel" class="text-[10px] font-bold text-white/70 uppercase tracking-[0.2em]">{{ text.current_cond }}</p>
                            <h2 class="text-4xl font-black" style="color: {{ color }}">{{ text.stage }} {{ stage }}</h2>
                        </div>
                        <h2 class="text-4xl font-black text-white">{{ latest.egfr }} <span class="text-xs text-slate-500">eGFR</span></h2>
                    </div>
                    {% else %}
                    <div class="h-full flex flex-col items-center justify-center text-slate-700 italic uppercase">Awaiting Data</div>
                    {% endif %}
                </div>
            </div>
        </div>

        <div class="card p-10 mb-12">
            <h3 class="text-xs font-bold text-slate-500 uppercase mb-8 tracking-widest">{{ text.predict }}</h3>
            <div class="h-[250px]"><canvas id="egfrChart"></canvas></div>
        </div>

        <footer class="text-center text-slate-700 text-xs uppercase tracking-[0.5em] pb-10">{{ text.developed_by }}</footer>
    </div>

    <script>
        let showingEffect = false;
        const video = document.getElementById('kidneyVideo');
        const simLabel = document.getElementById('simLabel');
        const waterBtn = document.getElementById('waterBtn');

        function toggleWater() {
            showingEffect = !showingEffect;
            video.src = showingEffect ? "{{ url_for('static', filename='videos/result_stage' ~ stage ~ '.mp4') }}" : "{{ url_for('static', filename='videos/stage' ~ stage ~ '.mp4') }}";
            simLabel.innerText = showingEffect ? "{{ text.sim_water }}" : "{{ text.current_cond }}";
            waterBtn.querySelector('span').innerText = showingEffect ? "{{ text.back_sim }}" : "{{ text.what_if }}";
            video.load(); video.play();
        }

        const ctx = document.getElementById('egfrChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: [{% for r in records %}"{{ r.date.strftime('%d/%m') }}",{% endfor %} {% if pred_val %}"Forecast"{% endif %}],
                datasets: [
                    { label: '{{ text.history }}', data: [{% for r in records %}{{ r.egfr }},{% endfor %} {% if pred_val %} null {% endif %}], borderColor: '{{ color }}', fill: true, backgroundColor: '{{ color }}22', tension: 0.4, borderWidth: 4 },
                    { label: '{{ text.predict }}', data: [{% for r in records %}{% if loop.last %}{{ r.egfr }}{% else %}null{% endif %},{% endfor %} {% if pred_val %} {{ pred_val }} {% endif %}], borderColor: '#94a3b8', borderDash: [8, 5], tension: 0.4, pointRadius: 6, borderWidth: 2 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
