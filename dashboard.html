<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if rtl else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <title>{{ text.dash }}</title>
</head>
<body class="bg-slate-950 text-white p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold text-blue-500">{{ text.dash }}</h1>
            <a href="/" class="bg-slate-800 px-4 py-2 rounded-lg text-xs">{{ text.back }}</a>
        </div>
        <div class="grid gap-4">
            {% for p in patients %}
            <div class="bg-slate-900 p-6 rounded-2xl flex justify-between items-center border border-slate-800 hover:border-slate-600 transition-all">
                <div>
                    <h3 class="text-xl font-bold">{{ p.name }}</h3>
                    <p class="text-slate-500">{{ p.age }}y • {{ p.gender }}</p>
                </div>
                <div class="flex gap-2">
                    <a href="{{ url_for('patient_detail', id=p.id) }}" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">{{ text.open_twin }}</a>
                    <form action="{{ url_for('delete_patient', id=p.id) }}" method="POST" onsubmit="return confirm('{{ text.confirm_del }}')">
                        <button type="submit" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
        <footer class="mt-20 text-center text-slate-700 text-xs uppercase tracking-widest">{{ text.developed_by }}</footer>
    </div>
</body>
</html>
